<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glow Merge</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    transition: background 0.6s ease;
}

/* 🌍 THEMES */
body.forest { background:#e8f5e9; }
body.ocean { background:#e0f7ff; }
body.sunset { background:#fff3e0; }
body.lavender { background:#f3e5f5; }
body.desert { background:#fff1d6; }

/* 🎮 LAYOUT */
h1 { margin: 10px; }

#info {
    margin: 10px;
    font-size: 18px;
}

button {
    padding: 8px 14px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #333;
    color: white;
}

/* 🧊 BOARD */
#game-container {
    width: 420px;
    height: 420px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-gap: 10px;
    padding: 10px;
    border-radius: 15px;
    background: rgba(0,0,0,0.1);
    position: relative;
    z-index: 10;
}

/* 🟦 TILE */
.tile {
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    font-weight:bold;
    border-radius:12px;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
}

/* 💥 POP */
.pop { animation: pop 0.2s ease; }

@keyframes pop {
    0% { transform: scale(0.6); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* ✨ COMBO GLOW */
.combo {
    box-shadow: 0 0 15px rgba(255,255,255,0.8),
                0 0 30px rgba(255,255,255,0.4);
}

/* 🌿 FOREST */
.forest .tile[data-value="2"] { background:#c8e6c9; }
.forest .tile[data-value="4"] { background:#a5d6a7; }
.forest .tile[data-value="8"] { background:#66bb6a; color:white; }

/* 🌊 OCEAN */
.ocean .tile[data-value="2"] { background:#d6f6ff; }
.ocean .tile[data-value="4"] { background:#80deea; }
.ocean .tile[data-value="8"] { background:#26c6da; color:white; }

/* 🌅 SUNSET */
.sunset .tile[data-value="2"] { background:#ffe0b2; }
.sunset .tile[data-value="4"] { background:#ffb74d; }
.sunset .tile[data-value="8"] { background:#fb8c00; color:white; }

/* 💜 LAVENDER */
.lavender .tile[data-value="2"] { background:#e1bee7; }
.lavender .tile[data-value="4"] { background:#ba68c8; }
.lavender .tile[data-value="8"] { background:#8e24aa; color:white; }

/* 🏜️ DESERT */
.desert .tile[data-value="2"] { background:#ffe0b2; }
.desert .tile[data-value="4"] { background:#ffb74d; }
.desert .tile[data-value="8"] { background:#ef6c00; color:white; }

/* 🌧️ PARTICLES */
.particle {
    position: absolute;
    pointer-events: none;
    font-size: 18px;
    opacity: 0.8;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
}
</style>
</head>

<body class="forest">

<h1>🌿 Glow Merge</h1>

<div id="info">
Score: <span id="score">0</span> |
Best: <span id="best">0</span> |
Combo: <span id="combo">0</span>
</div>

<button onclick="startGame()">Restart</button>
<button onclick="changeTheme()">Theme 🌍</button>
<button onclick="toggleSound()">Sound 🔊</button>

<div id="game-container"></div>

<!-- 🔊 SOUNDS -->
<audio id="sound"></audio>

<script>
let grid;
let score=0;
let combo=0;

let themes=["forest","ocean","sunset","lavender","desert"];
let tIndex=0;

let soundOn=false;
let best=localStorage.getItem("bestNature2")||0;

document.getElementById("best").textContent=best;

/* 🌧️ PARTICLES */
function spawnParticles(){
    setInterval(()=>{
        let p=document.createElement("div");
        p.className="particle";

        let theme=document.body.className;

        let icons={
            forest:"🍃",
            ocean:"💧",
            sunset:"✨",
            lavender:"🦋",
            desert:"🌵"
        };

        p.textContent=icons[theme];

        p.style.left=Math.random()*100+"vw";
        p.style.animationDuration=(4+Math.random()*3)+"s";

        document.body.appendChild(p);

        setTimeout(()=>p.remove(),7000);
    },800);
}

/* 🎮 START */
function startGame(){
    grid=Array(4).fill().map(()=>Array(4).fill(0));
    score=0;
    combo=0;
    updateUI();
    add();
    add();
    draw();
}

function updateUI(){
    document.getElementById("score").textContent=score;
    document.getElementById("combo").textContent=combo;

    if(score>best){
        best=score;
        localStorage.setItem("bestNature2",best);
        document.getElementById("best").textContent=best;
    }
}

/* ➕ ADD TILE */
function add(){
    let empty=[];
    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            if(grid[r][c]===0) empty.push({r,c});
        }
    }
    let spot=empty[Math.floor(Math.random()*empty.length)];
    grid[spot.r][spot.c]=Math.random()<0.9?2:4;
}

/* 🎨 DRAW */
function draw(){
    let container=document.getElementById("game-container");
    container.innerHTML="";

    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            let t=document.createElement("div");
            t.className="tile";

            let v=grid[r][c];
            if(v){
                t.textContent=v;
                t.setAttribute("data-value",v);

                t.classList.add("pop");

                if(v>=64){
                    t.classList.add("combo");
                }

                setTimeout(()=>t.classList.remove("pop"),200);
            }

            container.appendChild(t);
        }
    }
}

/* ➗ SLIDE */
function slide(row){
    row=row.filter(v=>v);

    for(let i=0;i<row.length-1;i++){
        if(row[i]===row[i+1]){
            row[i]*=2;
            score+=row[i];
            combo++;
            row[i+1]=0;

            if(soundOn) playSound();
        }
    }

    row=row.filter(v=>v);
    while(row.length<4) row.push(0);
    return row;
}

/* 🎮 MOVE */
function move(dir){
    let prev=JSON.stringify(grid);

    if(dir==="left"){
        for(let r=0;r<4;r++) grid[r]=slide(grid[r]);
    }
    if(dir==="right"){
        for(let r=0;r<4;r++) grid[r]=slide(grid[r].reverse()).reverse();
    }
    if(dir==="up"){
        for(let c=0;c<4;c++){
            let col=[];
            for(let r=0;r<4;r++) col.push(grid[r][c]);
            col=slide(col);
            for(let r=0;r<4;r++) grid[r][c]=col[r];
        }
    }
    if(dir==="down"){
        for(let c=0;c<4;c++){
            let col=[];
            for(let r=0;r<4;r++) col.push(grid[r][c]);
            col=slide(col.reverse()).reverse();
            for(let r=0;r<4;r++) grid[r][c]=col[r];
        }
    }

    if(JSON.stringify(grid)!==prev){
        add();
        draw();
        updateUI();
    }
}

/* ⌨️ CONTROLS */
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft")move("left");
    if(e.key==="ArrowRight")move("right");
    if(e.key==="ArrowUp")move("up");
    if(e.key==="ArrowDown")move("down");
});

/* 🌍 THEMES */
function changeTheme(){
    tIndex=(tIndex+1)%themes.length;
    document.body.className=themes[tIndex];
}

/* 🔊 SOUND */
function toggleSound(){
    soundOn=!soundOn;
    alert(soundOn?"Sound ON 🔊":"Sound OFF 🔇");
}

function playSound(){
    let a=document.getElementById("sound");
    a.src="https://www.soundjay.com/buttons/sounds/button-09.mp3";
    a.play();
}

startGame();
spawnParticles();
</script>

</body>
</html>
